name: Compilar APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Configurar JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Configurar Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Mostrar estructura del proyecto
      run: |
        echo "=== Raíz ==="
        ls -la
        echo "=== settings.gradle.kts ==="
        cat settings.gradle.kts || echo "No existe"
        echo "=== build.gradle.kts (raíz) ==="
        cat build.gradle.kts || echo "No existe"
        echo "=== app/build.gradle.kts ==="
        cat app/build.gradle.kts || echo "No existe"
        echo "=== app/src/ ==="
        ls -la app/src/ || echo "No existe"

    - name: Compilar APK con Gradle wrapper
      run: |
        if [ ! -f gradlew ]; then
          gradle wrapper --gradle-version 8.9
        fi
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Subir APK
      uses: actions/upload-artifact@v4
      with:
        name: AparellsCAP-debug
        path: app/build/outputs/apk/debug/app-debug.apk
