name: Compilar APK de AparellsCAP

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:  # Permite ejecutar la acción manualmente

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Obtener el código
      uses: actions/checkout@v4

    - name: Configurar JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Dar permisos de ejecución a Gradle
      run: chmod +x gradlew

    - name: Compilar APK de depuración
      run: ./gradlew assembleDebug

    - name: Subir APK como artefacto
      uses: actions/upload-artifact@v4
      with:
        name: AparellsCAP-debug
        path: app/build/outputs/apk/debug/app-debug.apk
